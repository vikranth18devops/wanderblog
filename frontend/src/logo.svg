<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <defs>
    <linearGradient id="horizonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCEABB"/>
      <stop offset="55%" style="stop-color:#F8A84B"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
    <linearGradient id="mountainDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A4B"/>
      <stop offset="100%" style="stop-color:#0D2233"/>
    </linearGradient>
    <linearGradient id="mountainMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2E6B8A"/>
      <stop offset="100%" style="stop-color:#1B3A4B"/>
    </linearGradient>
    <clipPath id="badge">
      <rect x="0" y="0" width="100" height="100" rx="4"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ICON BADGE -->
  <rect x="0" y="0" width="100" height="100" rx="6" fill="url(#horizonGrad)"/>

  <!-- Stars -->
  <circle cx="15" cy="14" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="30" cy="8"  r="0.9" fill="white" opacity="0.5"/>
  <circle cx="55" cy="11" r="1.1" fill="white" opacity="0.6"/>
  <circle cx="75" cy="7"  r="0.8" fill="white" opacity="0.4"/>
  <circle cx="88" cy="17" r="1.0" fill="white" opacity="0.55"/>
  <circle cx="44" cy="5"  r="0.7" fill="white" opacity="0.45"/>

  <!-- Sun glow -->
  <circle cx="72" cy="28" r="13" fill="#FFF0A0" opacity="0.25" filter="url(#glow)"/>
  <circle cx="72" cy="28" r="9"  fill="#FFE066" opacity="0.85"/>
  <circle cx="76" cy="26" r="7"  fill="#F8A84B" opacity="0.7"/>

  <!-- Back mountain range -->
  <polygon points="0,72 18,38 36,58 54,30 72,52 90,36 100,50 100,100 0,100"
           fill="url(#mountainDark)" clip-path="url(#badge)"/>

  <!-- Front mountain range -->
  <polygon points="0,100 0,68 22,52 44,72 62,46 80,64 100,54 100,100"
           fill="url(#mountainMid)" clip-path="url(#badge)" opacity="0.9"/>

  <!-- Snow caps -->
  <polygon points="22,52 17,60 27,60" fill="white" opacity="0.75" clip-path="url(#badge)"/>
  <polygon points="62,46 57,56 67,56" fill="white" opacity="0.75" clip-path="url(#badge)"/>
  <polygon points="54,30 49,42 59,42" fill="white" opacity="0.6" clip-path="url(#badge)"/>

  <!-- Foreground ground -->
  <rect x="0" y="82" width="100" height="18" fill="#0D2233" clip-path="url(#badge)"/>

  <!-- Winding path -->
  <path d="M10,100 Q30,80 50,90 Q70,100 90,82"
        stroke="#F8A84B" stroke-width="1.5" fill="none" opacity="0.6" stroke-dasharray="3,3"/>

  <!-- Pine trees -->
  <polygon points="8,82 11,70 14,82"  fill="#0D2233" clip-path="url(#badge)"/>
  <polygon points="86,82 89,71 92,82" fill="#0D2233" clip-path="url(#badge)"/>
  <polygon points="77,82 80,74 83,82" fill="#0D2233" clip-path="url(#badge)"/>

  <!-- Badge border -->
  <rect x="0" y="0" width="100" height="100" rx="6" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- WORDMARK -->

  <!-- Accent dot -->
  <circle cx="113" cy="52" r="3.5" fill="#F8A84B"/>

  <!-- WANDER -->
  <text
    x="124" y="54"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-size="34"
    font-weight="700"
    letter-spacing="5"
    fill="#0D2233"
  >WANDER</text>

  <!-- Divider rule -->
  <line x1="124" y1="62" x2="392" y2="62" stroke="#F8A84B" stroke-width="1.2"/>

  <!-- blog -->
  <text
    x="126" y="80"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-size="15"
    font-weight="400"
    font-style="italic"
    letter-spacing="12"
    fill="#2E6B8A"
  >blog</text>

</svg>
